<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container bg-secondary p-4 mt-5 rounded w-50">
        <p class="h1 text-center text-white fw-bold ">Basic Calculator</p>
        <input type="number" name="input" id="num1" class="form-control my-2 mt-5" placeholder="Enter first number">
        <input type="number" name="input" id="num2" class="form-control my-2" placeholder="Enter second number">
        <input type="number" name="result" id="result" class="form-control my-2" placeholder="Result" readonly>

        <div class="a-operation">
            <input type="button" value="Add" id="add" class="btn btn-dark w-50 mx-auto d-block mt-3">
            <input type="button" value="Subtract" id="sub" class="btn btn-dark w-50 mx-auto d-block mt-3">
            <input type="button" value="Multiply" id="mul" class="btn btn-dark w-50 mx-auto d-block mt-3">
            <input type="button" value="Divide" id="div" class="btn btn-dark w-50 mx-auto d-block mt-3">
        </div>
        <input type="button" value="Clear" id="clear" class="btn btn-dark w-50 mx-auto d-block mt-3">
    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
<script src="app.js"></script>

</html>
