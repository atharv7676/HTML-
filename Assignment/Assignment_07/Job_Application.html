<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="">

        <div class="form form11">
            <h1>Job Application</h1>
            <div>

            </div>
            <div>
                <input type="email" id="email" name="Email" placeholder="Enter E-Mail">
            </div>

            <div>
                <input type="number" name="mob" id="mobile" placeholder="Enter Mobile Number">
            </div>
            
            <div>
                <select name="language" id="language">
                    <option value="">Select Your Designated Role</option>
                    <option value="JUNIOR_MANAGER">JUNIOR MANAGER</option>
                    <option value="MANAGER">MANAGER</option>
                    <option value="SENIOR_MANAGER">SENIOR MANAGER</option>
                    <option value="TEAM_LEAD">TEAM LEAD</option>
                </select>
            </div>
            
            <div><input type="file"></div>

            <div>
                <input type="button" value="Submit">
            </div>
            
        </div>
    </form>
</body>
</html>
