<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student_Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="">
         <div class=" form form1">
            <h1>Student Registration</h1>
            <div>
                <input type="text" placeholder="Enter your Name">

            </div>
            <div>
                <input type="email" name="Email" id="email" placeholder="Enter Your Email">
            </div>


            <div>
                <select id="language" name="language">
                    <option value="">Enter your Course Name</option>
                    <option value="MERN">MERN</option>
                    <option value="JAVA">JAVA</option>
                    <option value="Python">PYTHON</option>
                    <option value="datascience">DATA SCIENCE</option>
                </select>
            </div>

            <div>
                <input type="radio" name="gender" id="m" value="Male">
                <label for="#m">MALE</label>
                <input type="radio" name="gender" id="f" value="Female">
                <label for="#f">FEMALE</label>
            </div>

            <div>
                <input type="date" id="dob" placeholder="Date-of-Birth">
            </div>

            <div>
                <input type="button" value="Submit" href="index.html">
            </div>

        </div>
    </form>
</body>
</html>
