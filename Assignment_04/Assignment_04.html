<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images & PDF Hyperlinks</title>
</head>

<body>

    <h1 style="font-size:30px; background-color:aqua; color:white; text-align:center;">
        Image & PDF Hyperlinks
    </h1>

    <!-- ================= PDF SECTION ================= -->
    <h2 style="text-align:center;">PDF Section</h2>
 
    <div style="text-align:center; margin-bottom:20px;">

    </div>

    <div style="display:flex; justify-content:center; gap:20px; margin-bottom:40px;">
        <a href="n1.pdf" target="frame">PDF 01</a>
        <a href="n2.pdf" target="frame">PDF 02</a>
        <a href="n3.pdf" target="frame">PDF 03</a>
        <a href="n4.pdf" target="frame">PDF 04</a>
        <a href="n5.pdf" target="frame">PDF 05</a>
    </div>

    <!-- ================= IMAGE SECTION ================= -->
    <h2 style="text-align:center;">Image Section</h2>

    <div style="text-align:center; margin-bottom:20px;">
        <iframe name="frame" 
                width="70%" 
                height="600px" 
                style="border:2px solid black; background-size:cover;">
        </iframe>
    </div>

    <div style="display:flex; justify-content:space-around; flex-wrap:wrap;">
        <a href="p1.jpeg" target="frame">image 01</a>
        

        <a href="p2.jpeg" target="frame"> image 02
        </a>

        <a href="p3.jpeg" target="frame">image 03
        </a>

        <a href="p4.jpeg" target="frame">image 04
        </a>

        <a href="p5.jpeg" target="frame">image 05
           
        </a>
    </div>

</body>
</html>
