<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="universe">
        <div class="sun">
            <h1>Sun</h1>
        </div>
        <div class="mercury-orbit">
            <div class=" planets mercury"><h1>Mercury</h1></div>
        </div>
        <div class="venus-orbit">
            <div class="planets venus"><h1>Venus</h1></div>
        </div>
        
        <div class="earth-orbit">
                <div class="planets earth"><h1>Earth</h1></div>   
        </div>

        <div class="mars-orbit">
            <div class="planets mars"><h1>Mars</h1></div>
        </div>

        <div class="jupiter-orbit">
            <div class="planets jupiter"><h1>Jupiter</h1></div>
        </div>

        <div class="saturn-orbit">
                <div class="planets saturn"><h1>Saturn</h1>
                    <div class="ring"></div>
                </div>
        </div>

        <div class="uranus-orbit">
            <div class="planets uranus"><h1>Uranus</h1>
                <div class="ring"></div>
            </div>
        </div>

        <div class="neptune-orbit">
            <div class="planets neptune"><h1>Neptune</h1></div>
        </div>
    </div>
</body>
</html>
