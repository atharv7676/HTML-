<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registeration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container_register">
        <form action="">
        <h1>Registeration Form</h1><br><br>

        <div class="container_sub"><br><br>
            <input type="text" name="number" id="name" placeholder="Enter your Name" required><br><br>

            <input type="email" name="number" id="email" placeholder="Enter your Email"><br><br>

            <input type="number" name="number" id="mobile" placeholder="Enter your Mobile Number"><br><br>

            <input type="password" name="number" id="password" placeholder="Enter the password" minlength="8" required><br>

            <div class="submission_buttons">
                <input type="submit" value="Register" id="submit"><br><br>

                <input type="reset" value="Reset" id="reset"><br><br>
            </div>
            <a href="index.html"><button type="submit">Back to Home</button></a>
        </div>
    </form>
    </div>
</body>

</html>
