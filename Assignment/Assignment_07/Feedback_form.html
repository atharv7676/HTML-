<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="">
        <div class="form form4">
            <h1>Feedback Form</h1>
            <input type="text" name="FirstName" id="fn" placeholder="First Name">

            <input type="email" name="Email" id="e" placeholder="Enter your Email">

            <input type="password" name="Pass" id="pass" required minlength="8" maxlength="16" placeholder="Enter Password">

            <div>
                <input type="checkbox" name="RememberMe" id="rm">
                <label for="#rm">REMEMBER ME</label>
            </div>

            <div>
                <input type="button" value="Submit">
            </div>
    </form>
</body>
</html>
