<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="">
        <div class="form form6">
            <h1>Hospital Appointment Form</h1>
            <div>
                <input type="text" name="Name" id="fn" placeholder="Enter Patients Name">
            </div>

            <div>
                <input type="number" name="Age" placeholder="Enter your Age" id="age">
            </div>

            <div>
                <input type="radio" name="Gender" id="M" value="Male">
                <label for="#M">Male</label>
                <input type="radio" name="Gender" id="F" value="FeMale">
                <label for="#F">FeMale</label>
            </div>

            <div>
                <label for="#date">Enter the appointment date</label><br>
                <input type="date" id="date">
            </div>


            <div>
                <select name="Department">
                    <option value="General_Department">General_Department</option>
                    <option value="Dental_Department">Dental_Department</option>
                    <option value="Surgery_Department">Surgery_Department</option>
                    <option value="ICU">ICU</option>
                </select>
            </div>
            <div>
                <input type="button" value="Submit">
            </div>
        </div>
    </form>
</body>
</html>
