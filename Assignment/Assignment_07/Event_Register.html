<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div class="form form5">
            <h1>Registration Form</h1>
            <div>

                <input type="text" name="FirstName" id="fn" placeholder="Enter your Name">
            </div>

            <div>
                <input type="email" name="email" id="email" placeholder="Enter your Email id">
            </div>

            <div>
                <input type="number" name="Phone_Number" id="phone" placeholder="Enter your mobile number">
            </div>

            <div>
                <select>
                    <option value="" selected disabled>---------------------Select your Event-------------------</option>
                    <option value="Hackthon">Hackthon</option>
                    <option value="CodeDebug">CodeDebug</option>
                    <option value="Debate">Debate</option>
                    <option value="coding">coding</option>
                </select>
            </div>

            <div>
                <input type="number" name="Ticket_Quantity" id="tq" min="1" max="2" placeholder="Enter the number of tickets (max 2)"><br>
            </div>
            <div>
                <input type="submit" value="Submit">

            </div>
        </div>
</body>
</html>
