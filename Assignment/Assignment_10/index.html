<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
</head>

<body>

<div class="box box1 animate__animated animate__bounce animate__infinite">Bounce</div>

<div class="box box2 animate__animated animate__flash animate__infinite animate__delay-1s">Flash</div>

<div class="box box3 animate__animated animate__pulse animate__infinite animate__delay-2s">Pulse</div>

<div class="box box4 animate__animated animate__rubberBand animate__infinite animate__delay-3s">RubberBand</div>

<div class="box box5 animate__animated animate__shakeX animate__infinite">ShakeX</div>

<div class="box box6 animate__animated animate__swing animate__infinite animate__delay-1s">Swing</div>

<div class="box box7 animate__animated animate__tada animate__infinite animate__delay-2s">Tada</div>

<div class="box box8 animate__animated animate__wobble animate__infinite animate__delay-3s">Wobble</div>

<div class="box box9 animate__animated animate__jello animate__infinite">Jello</div>

<div class="box box10 animate__animated animate__heartBeat animate__infinite animate__delay-1s">HeartBeat</div>

</body>

</html>
