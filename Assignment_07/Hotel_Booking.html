<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="">
        <div class="form form7">
            <h1>Hotel Booking</h1>
            <input type="text" name="guestName" required placeholder="Enter Guest Name">

            <input type="email" name="email" required placeholder="Enter Email ID">
            <input type="date" name="checkin" required placeholder="Enter Checkin date">
            <input type="date" name="checkout" required placeholder="Enter Checkout date">

            <select name="roomType" required >
                <option value="">--Select Room Type--</option>
                <option>Single</option>
                <option>Double</option>
                <option>Suite</option>
                <option>Deluxe</option>
            </select><br><br>
        </div>
    </form>
</body>
</html>
